# @fccview here!
# 
# This is the very bare minimum docker-compose file for degoog.
# You can leverage valkey and postgres to scale your instance to crazy highs, but obviously
# the more you add, the heavier the instance will be.
# Please navigate to the `docker-compose-examples/` folder for the various configurations.

services:
  degoog:
    image: ghcr.io/degoog-org/degoog:latest
    volumes:
      - ./data:/app/data
    ports:
      - "4444:4444"
    restart: unless-stopped
