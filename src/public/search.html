<!doctype html>
<html lang="en" __THEME_ATTRS__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="degoog is an alternative search engine aggregator."
    />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest" crossorigin="use-credentials"
    />
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      title="degoog"
      href="/opensearch.xml"
    />
    <title>degoog</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="/public/style.css?v=__APP_VERSION__" />
    __THEME_CSS__ __PLUGIN_ASSETS__
  </head>

  <body class="has-results">
    <div id="app">
      <header class="header" id="header" style="display: none">
        <div class="header-right">
          <a
            href="/settings"
            class="header-link"
            id="nav-settings-top"
            title="Settings"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </a>
        </div>
      </header>

      <main class="main" id="main-home" style="display: none">
        <div class="logo-container">
          <h1 class="logo">
            <span class="logo-d">d</span><span class="logo-e">e</span
            ><span class="logo-g1">g</span><span class="logo-o1">o</span
            ><span class="logo-o2">o</span><span class="logo-g2">g</span>
          </h1>
        </div>
        <div class="search-container">
          <form
            action="/search"
            method="get"
            id="search-form-home"
            class="search-form"
          >
            <div class="search-bar" id="search-bar-home">
              <svg
                class="search-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#9aa0a6"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input
                type="text"
                class="search-input"
                id="search-input"
                name="q"
                autocomplete="off"
                autofocus
                placeholder=""
              />
              <div class="ac-dropdown" id="ac-dropdown-home"></div>
              <div
                id="search-bar-actions-home"
                class="search-bar-actions"
              ></div>
            </div>
            <div class="button-row">
              <button type="submit" class="search-btn" id="btn-search">
                degoog Search
              </button>
              <button type="button" class="search-btn lucky-btn" id="btn-lucky">
                <span class="lucky-default">I'm Feeling Lucky</span>
                <div class="lucky-slot">
                  <div class="lucky-slot-inner" id="lucky-slot-inner">
                    <span>I'm Feeling Lucky</span>
                    <span class="lucky-alt">I'm Feeling Curious</span>
                    <span class="lucky-alt">I'm Feeling Adventurous</span>
                    <span class="lucky-alt">I'm Feeling Playful</span>
                    <span class="lucky-alt">I'm Feeling Stellar</span>
                    <span class="lucky-alt">I'm Feeling Trendy</span>
                  </div>
                </div>
              </button>
            </div>
          </form>
        </div>
        <div id="home-news-feed" class="home-news-feed"></div>
      </main>

      <div class="results-page" id="results-page">
        <div class="results-header">
          <a href="/" class="results-logo">
            <span class="logo-d">d</span><span class="logo-e">e</span
            ><span class="logo-g1">g</span><span class="logo-o1">o</span
            ><span class="logo-o2">o</span><span class="logo-g2">g</span>
          </a>
          <div class="results-search-bar" id="results-search-bar">
            <svg
              class="search-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#9aa0a6"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input
              type="text"
              class="search-input"
              id="results-search-input"
              autocomplete="off"
            />
            <div class="ac-dropdown" id="ac-dropdown-results"></div>
            <div
              id="search-bar-actions-results"
              class="search-bar-actions"
            ></div>
            <button class="search-submit-btn" id="results-search-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="#4285f4"
                stroke="none"
              >
                <circle
                  cx="11"
                  cy="11"
                  r="8"
                  fill="none"
                  stroke="#4285f4"
                  stroke-width="2"
                />
                <path d="M21 21l-4.35-4.35" stroke="#4285f4" stroke-width="2" />
              </svg>
            </button>
          </div>
          <a
            href="/settings"
            class="header-link settings-gear"
            id="nav-settings-results"
            title="Settings"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </a>
        </div>
        <div class="results-tabs" id="results-tabs">
          <div class="results-tab active" data-type="all">All</div>
          <div class="results-tab" data-type="images">Images</div>
          <div class="results-tab" data-type="videos">Videos</div>
          <div class="results-tab" data-type="news">News</div>
          <div class="tools-wrap" id="tools-bar">
            <button class="tools-toggle" id="tools-toggle" type="button">
              Options
            </button>
            <div
              class="tools-dropdown"
              id="tools-dropdown"
              style="display: none"
            >
              <button class="tools-menu-item" data-menu="time" type="button">
                <span class="tools-menu-label">Time</span>
                <span class="tools-menu-value" id="tools-time-val">Any time</span>
                <svg class="tools-menu-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
              <button class="tools-menu-item" data-menu="lang" type="button">
                <span class="tools-menu-label">Language</span>
                <span class="tools-menu-value" id="tools-lang-val">Any</span>
                <svg class="tools-menu-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="tools-submenu" id="tools-submenu-time" style="display: none">
              <button class="tools-option active" data-time="any">Any time</button>
              <button class="tools-option" data-time="hour">Hour</button>
              <button class="tools-option" data-time="day">24 hours</button>
              <button class="tools-option" data-time="week">Week</button>
              <button class="tools-option" data-time="month">Month</button>
              <button class="tools-option" data-time="year">Year</button>
              <button class="tools-option" data-time="custom">Custom...</button>
              <div class="tools-custom-date" id="tools-custom-date" style="display: none">
                <input type="date" id="tools-date-from" class="tools-date-input" />
                <span class="tools-date-sep">to</span>
                <input type="date" id="tools-date-to" class="tools-date-input" />
                <button type="button" class="tools-date-apply" id="tools-date-apply">Apply</button>
              </div>
            </div>
            <div class="tools-submenu" id="tools-submenu-lang" style="display: none">
              <input
                type="text"
                class="tools-lang-filter"
                id="tools-lang-filter"
                placeholder="Filter languages..."
                autocomplete="off"
              />
              <div class="tools-lang-list" id="tools-lang-list"></div>
            </div>
          </div>
        </div>
        <div class="image-tools-bar" id="image-tools-bar" hidden>
          <label class="image-tools-field">
            <span>Size</span>
            <select id="image-filter-size">
              <option value="any">Any size</option>
              <option value="icon">Icon</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
              <option value="wallpaper">Wallpaper</option>
            </select>
          </label>
          <label class="image-tools-field">
            <span>Color</span>
            <select id="image-filter-color">
              <option value="any">All colors</option>
              <option value="color">Full color</option>
              <option value="grayscale">Black and white</option>
              <option value="transparent">Transparent</option>
              <option value="red">Red</option>
              <option value="orange">Orange</option>
              <option value="yellow">Yellow</option>
              <option value="green">Green</option>
              <option value="teal">Teal</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
              <option value="pink">Pink</option>
              <option value="white">White</option>
              <option value="gray">Gray</option>
              <option value="black">Black</option>
              <option value="brown">Brown</option>
            </select>
          </label>
          <label class="image-tools-field">
            <span>Type</span>
            <select id="image-filter-type">
              <option value="any">All types</option>
              <option value="photo">Photo</option>
              <option value="clipart">Clip art</option>
              <option value="lineart">Line art</option>
              <option value="gif">GIF</option>
            </select>
          </label>
          <label class="image-tools-field">
            <span>Layout</span>
            <select id="image-filter-layout">
              <option value="any">All layouts</option>
              <option value="square">Square</option>
              <option value="wide">Wide</option>
              <option value="tall">Tall</option>
            </select>
          </label>
          <label class="image-tools-field">
            <span>License</span>
            <select id="image-filter-license">
              <option value="any">Any license</option>
              <option value="any-cc">Creative Commons</option>
              <option value="commercial">Commercial use</option>
              <option value="share">Sharing allowed</option>
            </select>
          </label>
          <button class="image-tools-clear" id="image-filter-clear" type="button">
            Reset
          </button>
        </div>
        <div class="results-meta" id="results-meta"></div>
        <div class="results-layout">
          <div class="results-main">
            <div id="at-a-glance"></div>
            <div
              id="slot-above-results"
              class="results-slot results-slot--above"
              data-position="above-results"
            ></div>
            <div id="results-list"></div>
            <div id="pagination"></div>
            <div
              id="slot-below-results"
              class="results-slot results-slot--below"
              data-position="below-results"
            ></div>
          </div>
          <aside class="results-sidebar">
            <div
              id="slot-above-sidebar"
              class="results-slot results-slot--above-sidebar"
              data-position="above-sidebar"
            ></div>
            <div id="results-sidebar"></div>
            <div
              id="slot-below-sidebar"
              class="results-slot results-slot--below-sidebar"
              data-position="below-sidebar"
            ></div>
          </aside>
        </div>
      </div>
    </div>
    <div class="media-overlay-root" id="media-overlay-root">
      <div class="media-preview-panel" id="media-preview-panel">
        <button
          class="media-preview-close"
          id="media-preview-close"
          type="button"
          aria-label="Close preview panel"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
        <div class="media-preview-img-wrap">
          <button
            class="media-preview-nav media-preview-prev"
            id="media-preview-prev"
            type="button"
            aria-label="Previous image"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <img
            class="media-preview-img"
            id="media-preview-img"
            src=""
            alt=""
          />
          <iframe
            class="media-preview-video"
            id="media-preview-video"
            src=""
            title=""
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            hidden
          ></iframe>
          <button
            class="media-preview-nav media-preview-next"
            id="media-preview-next"
            type="button"
            aria-label="Next image"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="9 6 15 12 9 18" />
            </svg>
          </button>
        </div>
        <div class="media-preview-info" id="media-preview-info"></div>
      </div>

      <div class="media-lightbox" id="media-lightbox" aria-hidden="true">
        <div
          class="media-lightbox-backdrop"
          id="media-lightbox-backdrop"
        ></div>
        <div class="media-lightbox-dialog" role="dialog" aria-modal="true">
          <button
            class="media-lightbox-close"
            id="media-lightbox-close"
            type="button"
            aria-label="Close media viewer"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
          <div class="media-lightbox-stage" id="media-lightbox-stage">
            <button
              class="media-lightbox-nav media-lightbox-prev"
              id="media-lightbox-prev"
              type="button"
              aria-label="Previous image"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
            <img
              class="media-lightbox-img"
              id="media-lightbox-img"
              src=""
              alt=""
              draggable="false"
            />
            <iframe
              class="media-lightbox-video"
              id="media-lightbox-video"
              src=""
              title=""
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              hidden
            ></iframe>
            <button
              class="media-lightbox-nav media-lightbox-next"
              id="media-lightbox-next"
              type="button"
              aria-label="Next image"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 6 15 12 9 18" />
              </svg>
            </button>
            <div class="media-lightbox-zoom" id="media-lightbox-zoom">
              <button
                class="media-lightbox-zoom-btn"
                id="media-lightbox-zoom-out"
                type="button"
                aria-label="Zoom out"
              >
                <svg
                  class="media-lightbox-zoom-icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <circle cx="10.5" cy="10.5" r="6.5"></circle>
                  <path d="M16 16l4 4"></path>
                  <path d="M8 10.5h5"></path>
                </svg>
              </button>
              <button
                class="media-lightbox-zoom-btn"
                id="media-lightbox-zoom-in"
                type="button"
                aria-label="Zoom in"
              >
                <svg
                  class="media-lightbox-zoom-icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <circle cx="10.5" cy="10.5" r="6.5"></circle>
                  <path d="M16 16l4 4"></path>
                  <path d="M10.5 8v5"></path>
                  <path d="M8 10.5h5"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="media-lightbox-info" id="media-lightbox-info"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/public/app.js?v=__APP_VERSION__"></script>
  </body>
</html>
