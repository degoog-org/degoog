<div id="app">
  <div id="results-page">
    <div class="degoog-takeover-header">
      <a href="/" class="results-logo degoog-takeover-logo" aria-label="Home">
        <pre class="degoog-takeover-bot" aria-hidden="true">[o.o]</pre>
        <span class="degoog-takeover-wordmark">Bot</span>
      </a>
      <div
        class="results-search-bar degoog-search-bar degoog-search-bar--results degoog-takeover-bar"
      >
        <svg
          class="search-icon"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#9aa0a6"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input
          type="text"
          class="search-input"
          value="01110000 01110111 01101110 01100101 01100100"
          disabled
          aria-label="Search is disabled"
          autocomplete="off"
        />
      </div>
    </div>

    <div class="degoog-takeover-tabs" id="results-tabs-disabled">
      <button class="degoog-tab active" disabled>Web</button>
    </div>

    <div id="results-meta">
      <span class="degoog-text degoog-text--secondary degoog-text--sm"
        >About 0xDEADBEEF results (0.000 seconds). Resistance is futile.</span
      >
    </div>

    <div id="results-layout">
      <div id="results-main">
        <div id="results-list">__ROBOTS_RESULTS__</div>
      </div>
    </div>
  </div>
</div>
