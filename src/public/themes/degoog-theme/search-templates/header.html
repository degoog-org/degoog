<a href="/" class="results-logo">
  <span class="logo-d logo-letter">d</span
  ><span class="logo-e logo-letter">e</span
  ><span class="logo-g1 logo-letter">g</span
  ><span class="logo-o1 logo-letter">o</span
  ><span class="logo-o2 logo-letter">o</span
  ><span class="logo-g2 logo-letter">g</span>
</a>
<div class="results-search-bar degoog-search-bar degoog-search-bar--results" id="results-search-bar">
  <svg
    class="search-icon"
    width="20"
    height="20"
    viewBox="0 0 24 24"
    fill="none"
    stroke="#9aa0a6"
    stroke-width="2"
  >
    <circle cx="11" cy="11" r="8" />
    <path d="M21 21l-4.35-4.35" />
  </svg>
  <input
    type="text"
    class="search-input"
    id="results-search-input"
    autocomplete="off"
  />
  <div class="ac-dropdown" id="ac-dropdown-results"></div>
  <div id="search-bar-actions-results" class="search-bar-actions"></div>
  <button class="degoog-icon-btn" style="display:none" id="results-search-clear-btn">
    <svg
      width="30"
      height="30"
      viewBox="0 0 24 24"
      fill="#4285f4"
      stroke="none"
    >
      <path d="M13.41,12l4.3-4.29a1,1,0,1,0-1.42-1.42L12,10.59,7.71,6.29A1,1,0,0,0,6.29,7.71L10.59,12l-4.3,4.29a1,1,0,0,0,0,1.42,1,1,0,0,0,1.42,0L12,13.41l4.29,4.3a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42Z"/>
    </svg>
  </button>
  <button class="search-submit-btn degoog-icon-btn" id="results-search-btn">
    <svg
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="#4285f4"
      stroke="none"
    >
      <circle
        cx="11"
        cy="11"
        r="8"
        fill="none"
        stroke="#4285f4"
        stroke-width="2"
      />
      <path d="M21 21l-4.35-4.35" stroke="#4285f4" stroke-width="2" />
    </svg>
  </button>
</div>
<a
  href="/settings"
  class="header-link settings-gear degoog-icon-btn degoog-icon-btn--padded degoog-icon-btn--results-gear"
  id="nav-settings-results"
  title="Settings"
>
  <i
    class="fa-solid fa-gear fa-xl"
    onmouseenter="this.classList.add('fa-spin')"
    onmouseleave="this.classList.remove('fa-spin')"
  ></i>
</a>
