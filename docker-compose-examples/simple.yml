# Minimal setup - single instance, in-memory cache only.
# Good for: personal use, low-traffic instances.
#
# Setup:
#   mkdir -p ./data && sudo chown -R 1000:1000 ./data
#   docker compose -f docker-compose-examples/simple.yml up -d

services:
  degoog:
    image: ghcr.io/degoog-org/degoog:latest
    volumes:
      - ./data:/app/data
    ports:
      - "4444:4444"
    restart: unless-stopped
    user: "1000:1000"
